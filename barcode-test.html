<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body>
    <h2>Тест штрих-кода</h2>
    <svg id="barcode"></svg>
    <p>Вы должны видеть штрих-код (полоски) над этим текстом</p>
    <script>
        JsBarcode("#barcode", "TEST-123", {
            format: "CODE128",
            width: 2,
            height: 50,
            displayValue: true
        });
    </script>
</body>
</html>
