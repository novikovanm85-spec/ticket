<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Получить билет | Музыкальный Квиз</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        body {
            background: #0a0000;
            font-family: Arial, sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 500px;
            background: #1a1a1a;
            border-radius: 20px;
            padding: 30px;
            border: 1px solid #cc0000;
        }
        h1 { color: #cc0000; text-align: center; }
        label { color: #cc0000; display: block; margin: 15px 0 5px; }
        input {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            border-radius: 10px;
        }
        button {
            background: #cc0000;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }
        .ticket {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            border: 2px solid #cc0000;
            color: black;
        }
        .ticket-header {
            text-align: center;
            border-bottom: 2px solid #cc0000;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .ticket-header h2 { color: #cc0000; margin: 0; }
        .ticket-info { margin-bottom: 10px; }
        .ticket-info span { color: #cc0000; font-weight: bold; }
        .barcode-container {
            display: flex;
            justify-content: center;
            margin: 15px 0;
            background: white;
            padding: 10px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎸 ПОЛУЧИТЬ БИЛЕТ</h1>
        
        <div id="eventInfo">
            <h2 style="color:#cc0000; text-align:center;">ROCK QUIZ</h2>
            <p style="text-align:center;">Музыкальная битва<br>28 мая 2026 / 18:00<br>Липецк, ул. Ленина, 31а</p>
        </div>
        
        <div id="formDiv">
            <label>ИМЯ</label>
            <input type="text" id="firstName" placeholder="Иван">
            <label>ФАМИЛИЯ</label>
            <input type="text" id="lastName" placeholder="Иванов">
            <button id="generateBtn">ПОЛУЧИТЬ БИЛЕТ</button>
        </div>
        
        <div id="ticketDiv" class="hidden"></div>
    </div>

    <script>
        function generateTicketNumber(firstName, lastName) {
            const random = Math.random().toString(36).substring(2, 10).toUpperCase();
            const f1 = firstName.substring(0, 2).toUpperCase();
            const l1 = lastName.substring(0, 2).toUpperCase();
            return `${f1}${l1}-${random}`;
        }
        
        function showTicket(firstName, lastName, ticketNumber) {
            const ticketDiv = document.getElementById('ticketDiv');
            ticketDiv.innerHTML = `
                <div class="ticket" id="ticketToDownload">
                    <div class="ticket-header">
                        <h2>ROCK QUIZ</h2>
                        <p>Музыкальная битва</p>
                    </div>
                    <div class="ticket-info"><span>ДАТА:</span> 28 мая 2026 / 18:00</div>
                    <div class="ticket-info"><span>МЕСТО:</span> Липецк, ул. Ленина, 31а</div>
                    <div class="ticket-info"><span>УЧАСТНИК:</span> ${firstName} ${lastName}</div>
                    <div class="ticket-info"><span>БИЛЕТ №:</span> ${ticketNumber}</div>
                    <div id="barcodeContainer" class="barcode-container"></div>
                    <div style="text-align: center; font-size: 0.7rem;">🎵 Отсканируйте штрих-код на входе</div>
                </div>
                <button id="downloadBtn">💾 СКАЧАТЬ БИЛЕТ</button>
            `;
            ticketDiv.classList.remove('hidden');
            
            // Генерируем штрих-код (прямо сейчас, без задержек)
            const container = document.getElementById('barcodeContainer');
            if (container) {
                container.innerHTML = '';
                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                container.appendChild(svg);
                JsBarcode(svg, ticketNumber, {
                    format: 'CODE128',
                    width: 2,
                    height: 50,
                    displayValue: false,
                    margin: 0
                });
            }
            
            // Скачивание билета
            document.getElementById('downloadBtn').addEventListener('click', () => {
                const element = document.getElementById('ticketToDownload');
                html2canvas(element, { scale: 2, backgroundColor: '#ffffff' }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `ticket_${firstName}_${lastName}.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                });
            });
        }
        
        document.getElementById('generateBtn').addEventListener('click', () => {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            
            if (!firstName || !lastName) {
                alert('Заполните имя и фамилию');
                return;
            }
            
            const ticketNumber = generateTicketNumber(firstName, lastName);
            document.getElementById('formDiv').classList.add('hidden');
            showTicket(firstName, lastName, ticketNumber);
        });
    </script>
</body>
</html>
