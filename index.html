<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Получить билет | Музыкальный Квиз</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0000;
            font-family: Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #1a1a1a;
            border-radius: 20px;
            padding: 30px;
            border: 1px solid #cc0000;
        }
        h1 { color: #cc0000; text-align: center; margin-bottom: 25px; font-size: 1.8rem; }
        h2 { color: #cc0000; text-align: center; font-size: 1.3rem; margin-bottom: 10px; }
        label { color: #cc0000; display: block; margin-bottom: 5px; font-weight: bold; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            border-radius: 10px;
            font-size: 1rem;
        }
        button {
            background: #cc0000;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #ff0000; }
        .error {
            background: rgba(204,0,0,0.2);
            padding: 10px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: center;
            color: #ff8888;
        }
        .ticket {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            border: 2px solid #cc0000;
            color: black;
        }
        .ticket-header { text-align: center; border-bottom: 2px solid #cc0000; padding-bottom: 10px; margin-bottom: 15px; }
        .ticket-header h2 { color: #cc0000; font-size: 1.5rem; margin: 0; }
        .ticket-header p { color: #333; margin: 5px 0 0; }
        .ticket-info { margin-bottom: 10px; color: #333; }
        .ticket-info span { color: #cc0000; font-weight: bold; }
        .qr-container {
            display: flex;
            justify-content: center;
            margin: 15px 0;
            background: white;
            padding: 10px;
            border-radius: 10px;
        }
        .ticket-code {
            text-align: center;
            font-family: monospace;
            font-size: 0.9rem;
            margin-top: 10px;
            color: #555;
            word-break: break-all;
        }
        .hidden { display: none; }
        .footer { text-align: center; font-size: 0.7rem; color: #666; margin-top: 20px; }
        .event-info { text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #333; }
        .event-info p { margin: 5px 0; color: #ccc; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <h1>🎸 ПОЛУЧИТЬ БИЛЕТ</h1>
        
        <div class="event-info">
            <h2>ROCK QUIZ</h2>
            <p>Музыкальная битва</p>
            <p>📅 28 мая 2026 / 18:00</p>
            <p>📍 Липецк, ул. Ленина, 31а</p>
        </div>
        
        <div id="formDiv">
            <label>ИМЯ</label>
            <input type="text" id="firstName" placeholder="Иван">
            <label>ФАМИЛИЯ</label>
            <input type="text" id="lastName" placeholder="Иванов">
            <button id="generateBtn">ПОЛУЧИТЬ БИЛЕТ</button>
        </div>
        
        <div id="ticketDiv" class="hidden"></div>
        <div id="errorDiv" class="error hidden"></div>
        <div class="footer">Билет можно получить только один раз</div>
    </div>

    <script>
        // ========== НАСТРОЙКА GOOGLE ТАБЛИЦЫ ==========
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwExUGSUCjdZCRFQSgHuFW8HtoRMiS64tWQsYpqxC6NTbdkNuK9u3QSIVGUM89qa_kf/exec';
        
        function hasTicket(firstName, lastName) {
            const key = firstName.toLowerCase().trim() + '_' + lastName.toLowerCase().trim();
            const saved = localStorage.getItem('ticket_issued');
            return saved === key;
        }
        
        function markIssued(firstName, lastName) {
            const key = firstName.toLowerCase().trim() + '_' + lastName.toLowerCase().trim();
            localStorage.setItem('ticket_issued', key);
        }
        
        function generateTicketNumber(firstName, lastName) {
            const random = Math.random().toString(36).substring(2, 10).toUpperCase();
            const f1 = firstName.substring(0, 2).toUpperCase();
            const l1 = lastName.substring(0, 2).toUpperCase();
            return `${f1}${l1}-${random}`;
        }
        
        async function sendToGoogleSheet(firstName, lastName, ticketNumber) {
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        firstName: firstName,
                        lastName: lastName,
                        ticketNumber: ticketNumber,
                        date: new Date().toLocaleString('ru-RU')
                    })
                });
                console.log('Данные отправлены в Google Таблицу');
            } catch(e) {
                console.log('Ошибка отправки:', e);
            }
        }
        
        function generateQRCode(containerId, text) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            new QRCode(container, {
                text: text,
                width: 160,
                height: 160,
                colorDark: "#000000",
                colorLight: "#ffffff"
            });
        }
        
        function showTicket(firstName, lastName, ticketNumber) {
            const ticketDiv = document.getElementById('ticketDiv');
            ticketDiv.innerHTML = `
                <div class="ticket" id="ticketToDownload">
                    <div class="ticket-header">
                        <h2>ROCK QUIZ</h2>
                        <p>Музыкальная битва</p>
                    </div>
                    <div class="ticket-info"><span>ДАТА:</span> 28 мая 2026 / 18:00</div>
                    <div class="ticket-info"><span>МЕСТО:</span> Липецк, ул. Ленина, 31а</div>
                    <div class="ticket-info"><span>УЧАСТНИК:</span> ${firstName} ${lastName}</div>
                    <div class="ticket-info"><span>БИЛЕТ №:</span> ${ticketNumber}</div>
                    <div id="qrContainer" class="qr-container"></div>
                    <div class="ticket-code">🎫 ${ticketNumber}</div>
                    <div style="text-align: center; font-size: 0.7rem; margin-top: 10px;">🎵 Предъявите QR-код на входе для сканирования</div>
                </div>
                <button id="downloadBtn">💾 СКАЧАТЬ БИЛЕТ</button>
            `;
            ticketDiv.classList.remove('hidden');
            
            // Генерация QR-кода
            generateQRCode('qrContainer', ticketNumber);
            
            // Кнопка скачивания
            const downloadBtn = document.getElementById('downloadBtn');
            if (downloadBtn) {
                downloadBtn.addEventListener('click', async () => {
                    const element = document.getElementById('ticketToDownload');
                    try {
                        const canvas = await html2canvas(element, { scale: 2, backgroundColor: '#ffffff' });
                        const link = document.createElement('a');
                        link.download = `ticket_${firstName}_${lastName}.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                    } catch(err) {
                        alert('Ошибка при сохранении билета');
                    }
                });
            }
        }
        
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const errorDiv = document.getElementById('errorDiv');
            const formDiv = document.getElementById('formDiv');
            
            if (!firstName || !lastName) {
                errorDiv.innerHTML = '❌ Заполните имя и фамилию';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            if (hasTicket(firstName, lastName)) {
                errorDiv.innerHTML = '❌ Вы уже получили билет. Билет выдаётся один раз.';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            const ticketNumber = generateTicketNumber(firstName, lastName);
            
            await sendToGoogleSheet(firstName, lastName, ticketNumber);
            markIssued(firstName, lastName);
            
            formDiv.classList.add('hidden');
            errorDiv.classList.add('hidden');
            showTicket(firstName, lastName, ticketNumber);
        });
    </script>
</body>
</html>
