<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Получить билет | Музыкальный Квиз</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&family=Russo+One&family=Oswald:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: #0a0000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: linear-gradient(145deg, #0f0f0f 0%, #1a0a0a 100%);
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(204,0,0,0.3);
        }
        h1 {
            font-family: 'Russo One', sans-serif;
            font-size: 1.8rem;
            text-align: center;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            font-family: 'Oswald', sans-serif;
            color: #cc0000;
            display: block;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 30px;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #cc0000;
        }
        .btn {
            background: #cc0000;
            color: white;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 2px;
            padding: 14px 24px;
            border: none;
            width: 100%;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn:hover {
            background: #ff0000;
            transform: scale(1.02);
        }
        .error {
            background: rgba(204,0,0,0.2);
            border-left: 4px solid #cc0000;
            padding: 12px;
            border-radius: 12px;
            margin-top: 15px;
            text-align: center;
            font-size: 0.9rem;
        }
        .ticket {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 24px;
        }
        .footer-note {
            text-align: center;
            font-size: 0.65rem;
            color: #aaa;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <h1>🎸 ПОЛУЧИТЬ БИЛЕТ</h1>
        
        <div id="formContainer">
            <div class="form-group">
                <label>ИМЯ *</label>
                <input type="text" id="firstName" placeholder="Иван">
            </div>
            <div class="form-group">
                <label>ФАМИЛИЯ *</label>
                <input type="text" id="lastName" placeholder="Иванов">
            </div>
            <button class="btn" id="generateBtn">🎫 ПОЛУЧИТЬ БИЛЕТ</button>
        </div>
        
        <div id="ticketContainer" style="display: none;"></div>
        <div id="errorMessage" class="error" style="display: none;"></div>
        <div class="footer-note">Билет можно получить только один раз</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby_8GqoxJS_OmCGJO-wI4mrJIqVW4SlTS56LDypLtE-Qg13ZOV06LSatLBpkAj_InXTyg/exec';
        
        function isTicketIssued(firstName, lastName) {
            const key = `${firstName.toLowerCase().trim()}_${lastName.toLowerCase().trim()}`;
            const issued = localStorage.getItem('issued_tickets') || '[]';
            const list = JSON.parse(issued);
            return list.includes(key);
        }
        
        function markTicketIssued(firstName, lastName) {
            const key = `${firstName.toLowerCase().trim()}_${lastName.toLowerCase().trim()}`;
            const issued = localStorage.getItem('issued_tickets') || '[]';
            const list = JSON.parse(issued);
            list.push(key);
            localStorage.setItem('issued_tickets', JSON.stringify(list));
        }
        
        function generateTicketId(firstName, lastName) {
            const timestamp = Date.now();
            const random = Math.random().toString(36).substring(2, 6).toUpperCase();
            const initials = `${firstName.substring(0, 2)}${lastName.substring(0, 2)}`.toUpperCase();
            return `${initials}-${timestamp.toString().slice(-6)}-${random}`;
        }
        
        async function saveToGoogleSheet(firstName, lastName, ticketId) {
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        firstName: firstName,
                        lastName: lastName,
                        ticketId: ticketId,
                        date: new Date().toLocaleString('ru-RU')
                    })
                });
                console.log('Данные сохранены в Google Таблицу');
            } catch(e) {
                console.log('Ошибка сохранения:', e);
            }
        }
        
        function renderTicket(firstName, lastName, ticketId) {
            const container = document.getElementById('ticketContainer');
            container.innerHTML = `
                <div class="ticket" id="ticketToDownload">
                    <div style="text-align: center; border-bottom: 2px solid #cc0000; padding-bottom: 12px; margin-bottom: 16px;">
                        <div style="font-family: 'Russo One', sans-serif; font-size: 1.5rem; background: linear-gradient(135deg, #ff0000, #cc0000); background-clip: text; -webkit-background-clip: text; color: transparent;">ROCK QUIZ</div>
                        <div style="font-family: 'Bebas Neue', sans-serif; font-size: 0.8rem;">Музыкальная битва</div>
                    </div>
                    <div style="margin-bottom: 16px;">
                        <div style="display: flex; margin-bottom: 12px;"><div style="color: #cc0000; width: 90px; font-weight: bold;">ДАТА</div><div>28 мая 2026 / 18:00</div></div>
                        <div style="display: flex; margin-bottom: 12px;"><div style="color: #cc0000; width: 90px; font-weight: bold;">МЕСТО</div><div>Липецк, ул. Ленина, 31а</div></div>
                        <div style="background: rgba(204,0,0,0.1); border-left: 3px solid #cc0000; padding: 12px; margin: 12px 0;">
                            <div><span style="color: #cc0000;">УЧАСТНИК</span> <strong>${firstName} ${lastName}</strong></div>
                        </div>
                        <div><span style="color: #cc0000;">БИЛЕТ №</span> ${ticketId}</div>
                    </div>
                    <div id="qr_${ticketId}" style="display: flex; justify-content: center; margin: 15px 0;"></div>
                    <div style="text-align: center; font-size: 0.7rem; color: #aaa; margin-top: 15px;">
                        🎵 Предъявите билет на входе
                    </div>
                </div>
                <button id="downloadTicketBtn" class="btn" style="margin-top: 15px;">💾 СКАЧАТЬ БИЛЕТ</button>
            `;
            container.style.display = 'block';
            
            new QRCode(document.getElementById(`qr_${ticketId}`), {
                text: ticketId,
                width: 160,
                height: 160,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
            
            document.getElementById('downloadTicketBtn').addEventListener('click', () => {
                const ticketElement = document.getElementById('ticketToDownload');
                html2canvas(ticketElement, {
                    scale: 2,
                    backgroundColor: null,
                    logging: false
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `ticket_${firstName}_${lastName}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                }).catch(err => {
                    alert('Ошибка при сохранении билета');
                });
            });
        }
        
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const errorDiv = document.getElementById('errorMessage');
            const formContainer = document.getElementById('formContainer');
            
            if (!firstName || !lastName) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Заполните имя и фамилию';
                return;
            }
            
            if (isTicketIssued(firstName, lastName)) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Вы уже получили билет. Билет выдаётся один раз.';
                return;
            }
            
            const ticketId = generateTicketId(firstName, lastName);
            
            await saveToGoogleSheet(firstName, lastName, ticketId);
            markTicketIssued(firstName, lastName);
            
            formContainer.style.display = 'none';
            errorDiv.style.display = 'none';
            
            renderTicket(firstName, lastName, ticketId);
        });
    </script>
</body>
</html>
