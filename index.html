<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест штрих-кода</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body style="background: white; text-align: center; padding: 40px;">
    <h2>Тест штрих-кода</h2>
    <svg id="barcode"></svg>
    <p>Вы должны увидеть полоски выше</p>
    <script>
        JsBarcode("#barcode", "TEST-123", {
            format: "CODE128",
            width: 2,
            height: 60,
            displayValue: true
        });
    </script>
</body>
</html>
