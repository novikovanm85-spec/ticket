<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Проверка билетов | Музыкальный Квиз</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0a0000;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #1a1a1a;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid #cc0000;
            text-align: center;
        }
        h1 {
            color: #cc0000;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        .manual-input {
            margin: 20px 0;
        }
        .manual-input input {
            width: 100%;
            padding: 15px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            border-radius: 10px;
            font-size: 1.2rem;
            text-align: center;
            font-family: monospace;
        }
        .btn {
            background: #cc0000;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
            width: 100%;
        }
        .btn:hover { background: #ff0000; }
        .result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .result.valid {
            background: rgba(0,200,0,0.2);
            border: 1px solid #00cc00;
            color: #88ff88;
        }
        .result.invalid {
            background: rgba(200,0,0,0.2);
            border: 1px solid #cc0000;
            color: #ff8888;
        }
        .stats {
            margin-top: 20px;
            padding: 10px;
            background: #0a0a0a;
            border-radius: 10px;
            font-size: 0.8rem;
            color: #888;
        }
        .note {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎸 ПРОВЕРКА БИЛЕТОВ</h1>
        <p>Введите номер билета (крупный текст на билете)</p>
        
        <div class="manual-input">
            <input type="text" id="ticketNumber" placeholder="Например: NAHГ-WQRSY0GS">
            <button class="btn" id="checkBtn">ПРОВЕРИТЬ</button>
        </div>
        
        <div id="result" class="result"></div>
        
        <div class="stats" id="stats">
            ⏳ Загрузка списка билетов...
        </div>
        
        <button class="btn" id="refreshBtn" style="background: #333;">🔄 ОБНОВИТЬ СПИСОК</button>
        
        <div class="note">
            ✅ Билет действителен — допуск на мероприятие<br>
            ❌ Билет не найден — проверьте правильность ввода<br>
            📋 Список билетов загружается из Google Таблицы
        </div>
    </div>

    <script>
        let validTickets = [];
        
        // URL вашего Google Apps Script (должен возвращать список билетов)
        // ВАЖНО: замените на ваш URL
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby_8GqoxJS_OmCGJO-wI4mrJIqVW4SlTS56LDypLtE-Qg13ZOV06LSatLBpkAj_InXTyg/exec';
        
        async function loadValidTickets() {
            const statsDiv = document.getElementById('stats');
            statsDiv.innerHTML = '⏳ Загрузка списка билетов...';
            
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL + '?action=getTickets');
                const data = await response.json();
                if (data.tickets && data.tickets.length > 0) {
                    validTickets = data.tickets;
                    statsDiv.innerHTML = `✅ Загружено ${validTickets.length} действительных билетов`;
                } else {
                    // Если не загрузилось, используем ручной режим
                    statsDiv.innerHTML = `⚠️ Загрузка не удалась. Используется ручной режим.`;
                    validTickets = [];
                }
            } catch(e) {
                console.log('Ошибка загрузки:', e);
                statsDiv.innerHTML = `⚠️ Не удалось загрузить список. Билеты нужно добавлять вручную.`;
                validTickets = [];
            }
        }
        
        function checkTicket() {
            const input = document.getElementById('ticketNumber');
            const ticketNumber = input.value.trim();
            const resultDiv = document.getElementById('result');
            
            if (!ticketNumber) {
                resultDiv.innerHTML = '❌ Введите номер билета';
                resultDiv.className = 'result invalid';
                return;
            }
            
            // Поиск в списке (регистронезависимый)
            const found = validTickets.some(t => t.toUpperCase() === ticketNumber.toUpperCase());
            
            if (found) {
                resultDiv.innerHTML = `✅ БИЛЕТ ДОПУЩЕН<br>Номер: ${ticketNumber}`;
                resultDiv.className = 'result valid';
            } else {
                resultDiv.innerHTML = `❌ БИЛЕТ НЕ НАЙДЕН<br>Номер: ${ticketNumber}<br><br>Проверьте правильность ввода.`;
                resultDiv.className = 'result invalid';
            }
        }
        
        // Добавление билета вручную (если нужно)
        function addManualTicket() {
            const ticketNumber = prompt('Введите номер билета для добавления:');
            if (ticketNumber && ticketNumber.trim()) {
                validTickets.push(ticketNumber.trim());
                const statsDiv = document.getElementById('stats');
                statsDiv.innerHTML = `✅ Добавлен билет: ${ticketNumber}. Всего: ${validTickets.length}`;
                document.getElementById('ticketNumber').value = '';
                document.getElementById('result').innerHTML = '';
            }
        }
        
        document.getElementById('checkBtn').addEventListener('click', checkTicket);
        document.getElementById('refreshBtn').addEventListener('click', loadValidTickets);
        
        // Добавляем обработку Enter
        document.getElementById('ticketNumber').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkTicket();
        });
        
        loadValidTickets();
    </script>
</body>
</html>
