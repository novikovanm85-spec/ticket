<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Проверка билетов | Музыкальный Квиз</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0000;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: linear-gradient(145deg, #0f0f0f, #1a0a0a);
            border-radius: 32px;
            padding: 24px;
            border: 1px solid rgba(204,0,0,0.3);
            text-align: center;
        }
        h1 {
            font-family: 'Russo One', sans-serif;
            font-size: 1.8rem;
            color: #cc0000;
            margin-bottom: 20px;
        }
        .reader {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
        }
        .result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 16px;
            font-weight: bold;
        }
        .result.valid {
            background: rgba(0,200,0,0.2);
            border-left: 4px solid #00cc00;
            color: #88ff88;
        }
        .result.invalid {
            background: rgba(200,0,0,0.2);
            border-left: 4px solid #cc0000;
            color: #ff8888;
        }
        .manual-input {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(204,0,0,0.3);
        }
        .manual-input input {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 30px;
            font-size: 1rem;
            text-align: center;
        }
        .btn {
            background: #cc0000;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            margin-top: 10px;
            cursor: pointer;
        }
        .note {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #888;
        }
        .refresh-btn {
            background: #333;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎸 ПРОВЕРКА БИЛЕТОВ</h1>
        <p>Наведите камеру на QR-код билета</p>
        
        <div id="reader" class="reader"></div>
        
        <div id="result" class="result"></div>
        
        <div class="manual-input">
            <p>Или введите номер билета вручную:</p>
            <input type="text" id="manualCode" placeholder="Например: IVAN-123456-ABCD">
            <button class="btn" id="checkBtn">ПРОВЕРИТЬ</button>
        </div>
        
        <button class="btn refresh-btn" id="refreshBtn">🔄 ОБНОВИТЬ СПИСОК</button>
        
        <div class="note">
            ✅ Допущен — билет в базе<br>
            ❌ Не найден — билет не действителен
        </div>
    </div>

    <script>
        // Ручной список билетов (пока добавляем вручную)
        // ВАЖНО: сюда вы будете добавлять номера билетов после оплаты
        let validTickets = [
            // Пример: "IVAN-123456-ABCD",
        ];
        
        function checkTicket(ticketNumber) {
            const resultDiv = document.getElementById('result');
            if (!ticketNumber || ticketNumber.trim() === '') {
                resultDiv.innerHTML = '❌ Введите номер билета';
                resultDiv.className = 'result invalid';
                return false;
            }
            
            const normalized = ticketNumber.trim();
            if (validTickets.includes(normalized)) {
                resultDiv.innerHTML = `✅ БИЛЕТ ДОПУЩЕН<br>Номер: ${normalized}`;
                resultDiv.className = 'result valid';
                return true;
            } else {
                resultDiv.innerHTML = `❌ БИЛЕТ НЕ НАЙДЕН<br>Номер: ${normalized}`;
                resultDiv.className = 'result invalid';
                return false;
            }
        }
        
        // Ручная проверка
        document.getElementById('checkBtn').addEventListener('click', () => {
            const code = document.getElementById('manualCode').value;
            checkTicket(code);
        });
        
        // Обновление списка (пока просто перезагружаем страницу)
        document.getElementById('refreshBtn').addEventListener('click', () => {
            location.reload();
        });
        
        // QR-сканер
        let html5QrCode = null;
        
        function startScanner() {
            if (html5QrCode) {
                html5QrCode.stop().catch(err => console.log(err));
            }
            
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    html5QrCode.stop().catch(err => console.log(err));
                    document.getElementById('manualCode').value = decodedText;
                    checkTicket(decodedText);
                    
                    setTimeout(() => {
                        startScanner();
                    }, 3000);
                },
                (errorMessage) => { console.log(errorMessage); }
            ).catch(err => console.log(err));
        }
        
        startScanner();
    </script>
</body>
</html>
